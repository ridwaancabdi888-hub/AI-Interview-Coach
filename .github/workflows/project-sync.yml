name: Project Sync

on:
  push:
    paths:
      - '.github/project-sync.trigger'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rebuild project from archive
        run: |
          cat .github/project.part.* > /tmp/project.b64
          base64 -d /tmp/project.b64 > /tmp/project.tar.gz
          tar -xzf /tmp/project.tar.gz -C .
          rm -f .github/project.part.* .github/project-sync.trigger .github/workflows/project-sync.yml
      - name: Commit synchronized project
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: complete interview platform core phases and security fixes'
          git push
